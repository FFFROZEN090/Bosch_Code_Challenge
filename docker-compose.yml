# ME Engineering Assistant — Docker Compose
# Launch:  docker compose up --build
# Access:  http://localhost (UI)  |  http://localhost/api/invocations (REST API)
#
# Ollama runs on the HOST machine (not in Docker) for GPU acceleration.
# Start it before running docker compose:
#   ollama serve &
#   ollama pull qwen2.5:7b

services:

  # ── RAG API (MLflow model serving) ───────────────────────
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVICE_MODE: api
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      ROUTING_STRATEGY: ${ROUTING_STRATEGY:-regex}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5001/ping"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${RAG_MEMORY_LIMIT:-2g}

  # ── Streamlit UI ─────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SERVICE_MODE: ui
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      ROUTING_STRATEGY: ${ROUTING_STRATEGY:-regex}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${UI_MEMORY_LIMIT:-1g}

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      rag-api:
        condition: service_healthy
      ui:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${NGINX_MEMORY_LIMIT:-128m}

networks:
  internal:
    driver: bridge
