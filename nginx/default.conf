# ME Engineering Assistant — Nginx reverse proxy

upstream streamlit {
    server ui:8501;
}

upstream rag_api {
    server rag-api:5001;
}

server {
    listen 80;
    server_name _;

    # ── Health check ────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status": "ok", "service": "nginx"}';
        add_header Content-Type application/json;
    }

    # ── RAG REST API (MLflow model serving) ─────────────
    location /api/ {
        proxy_pass http://rag_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # LLM inference can take 12-18s
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Streamlit internal endpoints ────────────────────
    location /_stcore/ {
        proxy_pass http://streamlit/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Streamlit UI (default) ──────────────────────────
    location / {
        proxy_pass http://streamlit;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit requires WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
